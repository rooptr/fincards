<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Walmart liquidity ratio evidence extract</title>
  <desc id="desc">A field extract rebuilt from Walmart's 2024 annual report showing cash, receivables, inventory, current assets and current liabilities, with the resulting current, quick and cash ratios.</desc>
  <rect width="1200" height="720" fill="#fbfbfd"/>
  <text x="72" y="74" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111827">Walmart balance sheet, January 31, 2024</text>
  <text x="72" y="112" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#6b7280">Amounts in millions. Fields rebuilt from the Consolidated Balance Sheets.</text>
  <rect x="72" y="150" width="1056" height="470" rx="18" fill="#ffffff" stroke="#d9dde5"/>
  <rect x="72" y="150" width="1056" height="60" rx="18" fill="#f0f5ff"/>
  <rect x="72" y="192" width="1056" height="18" fill="#f0f5ff"/>
  <text x="98" y="188" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Balance-sheet field</text>
  <text x="520" y="188" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Reported value</text>
  <text x="850" y="188" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Ratio use</text>
  <line x1="72" y1="210" x2="1128" y2="210" stroke="#e5e7eb"/>
  <text x="98" y="252" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Cash and cash equivalents</text><text x="520" y="252" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$9,867m</text><text x="850" y="252" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">Cash Ratio, Quick Ratio</text>
  <line x1="98" y1="273" x2="1102" y2="273" stroke="#eef0f4"/>
  <text x="98" y="310" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Receivables, net</text><text x="520" y="310" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$8,796m</text><text x="850" y="310" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">Quick Ratio</text>
  <line x1="98" y1="331" x2="1102" y2="331" stroke="#eef0f4"/>
  <text x="98" y="368" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Inventories</text><text x="520" y="368" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$54,892m</text><text x="850" y="368" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">Current Ratio only</text>
  <line x1="98" y1="389" x2="1102" y2="389" stroke="#eef0f4"/>
  <text x="98" y="426" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Total current assets</text><text x="520" y="426" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$76,877m</text><text x="850" y="426" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">Current Ratio</text>
  <line x1="98" y1="447" x2="1102" y2="447" stroke="#eef0f4"/>
  <text x="98" y="484" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Total current liabilities</text><text x="520" y="484" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$92,415m</text><text x="850" y="484" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">All three denominators</text>
  <line x1="98" y1="505" x2="1102" y2="505" stroke="#eef0f4"/>
  <text x="98" y="542" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#111827">Derived outputs</text><text x="520" y="542" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Current 0.83x | Quick 0.20x | Cash 0.11x</text>
  <text x="72" y="674" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#9ca3af">Source: Walmart Inc. Annual Report 2024, Consolidated Balance Sheets, page 56.</text>
</svg>
