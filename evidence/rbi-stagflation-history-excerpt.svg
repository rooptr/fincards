<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">RBI monetary policy history field extract</title>
  <desc id="desc">RBI field extract showing average growth around 4.0 percent and WPI inflation around 8.8 percent during the cited period.</desc>
  <rect width="1200" height="460" fill="#ffffff"/>
  <text x="64" y="72" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">RBI monetary policy history</text>
  <text x="64" y="108" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Field extract from Seven Ages of India’s Monetary Policy.</text>
  <line x1="64" y1="140" x2="1136" y2="140" stroke="#d1d5db"/>
  <g font-family="Arial, sans-serif" font-size="20" fill="#111827">
    <text x="80" y="205" font-weight="700">Average real growth</text><text x="690" y="205">Around 4.0%</text>
    <text x="80" y="275" font-weight="700">WPI based inflation</text><text x="690" y="275">Around 8.8%</text>
    <text x="80" y="345" font-weight="700">Historical condition</text><text x="690" y="345">High inflation with weak growth</text>
  </g>
  <text x="64" y="415" font-family="Arial, sans-serif" font-size="15" fill="#6b7280">Source field: RBI, Seven Ages of India’s Monetary Policy, monetary policy history section.</text>
</svg>
