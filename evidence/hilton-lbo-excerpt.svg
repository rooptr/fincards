  <text x="650" y="528" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#202124">64,102,564</text>
  <text x="78" y="566" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">Sponsor ownership after IPO</text>
  <text x="650" y="566" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2563eb">Approximately 76.4%</text>
  <line x1="78" y1="600" x2="1122" y2="600" stroke="#d8dbe2"/>
  <text x="78" y="640" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5f6368">Missing sponsor equity and distribution records remain explicit research fields for a complete MOIC.</text>
