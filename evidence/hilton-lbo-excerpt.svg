  <text x="650" y="414" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#202124">$7.6 billion</text>
  <text x="78" y="452" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">Revolving credit facility</text>
  <text x="650" y="452" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#202124">$1.0 billion</text>
