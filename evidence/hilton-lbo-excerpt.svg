  <text x="78" y="120" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5f6368">Hilton and Blackstone SEC filings • 2007 acquisition • 2013 financing and IPO</text>
  <line x1="78" y1="144" x2="1122" y2="144" stroke="#d8dbe2"/>
  <text x="78" y="184" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#202124">Acquisition record</text>
  <text x="78" y="224" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">Acquisition consideration</text>
  <text x="650" y="224" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2563eb">$47.50 per share</text>
  <text x="78" y="262" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">Transaction value</text>
  <text x="650" y="262" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#202124">Approximately $26 billion</text>
  <text x="78" y="300" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">Premium to prior close</text>
  <text x="650" y="300" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2563eb">40%</text>
  <line x1="78" y1="334" x2="1122" y2="334" stroke="#d8dbe2"/>
  <text x="78" y="374" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#202124">Financing and public re-entry</text>
