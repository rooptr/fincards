<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Zomato IPO evidence extract</title>
  <desc id="desc">A field extract rebuilt from Zomato's prospectus, annual report and listing report showing the offer price, fresh issue, offer for sale and BSE opening price.</desc>
  <rect width="1200" height="720" fill="#fbfbfd"/>
  <text x="72" y="78" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111827">Zomato public offer, July 2021</text>
  <text x="72" y="116" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#6b7280">Field extract rebuilt from the primary offer documents and contemporaneous listing record</text>
  <rect x="72" y="164" width="1056" height="430" rx="18" fill="#ffffff" stroke="#d9dde5"/>
  <rect x="72" y="164" width="1056" height="62" rx="18" fill="#f0f5ff"/>
  <rect x="72" y="208" width="1056" height="18" fill="#f0f5ff"/>
  <text x="98" y="203" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Offer document field</text>
  <text x="560" y="203" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Recorded value</text>
  <line x1="72" y1="226" x2="1128" y2="226" stroke="#e5e7eb"/>
  <text x="98" y="271" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#111827">Offer price</text>
  <text x="560" y="271" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#374151">Rs 76 per share</text>
  <line x1="98" y1="296" x2="1102" y2="296" stroke="#eef0f4"/>
  <text x="98" y="341" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#111827">Fresh issue</text>
  <text x="560" y="341" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#374151">1,184,210,526 shares, Rs 90,000 million</text>
  <line x1="98" y1="366" x2="1102" y2="366" stroke="#eef0f4"/>
  <text x="98" y="411" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#111827">Offer for sale</text>
  <text x="560" y="411" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#374151">49,342,105 shares, Rs 3,750 million</text>
  <line x1="98" y1="436" x2="1102" y2="436" stroke="#eef0f4"/>
  <text x="98" y="481" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#111827">BSE opening price, July 23, 2021</text>
  <text x="560" y="481" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#374151">Rs 115 per share</text>
  <line x1="98" y1="506" x2="1102" y2="506" stroke="#eef0f4"/>
  <text x="98" y="551" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#111827">Opening price premium</text>
  <text x="560" y="551" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#374151">51.32% above offer price</text>
  <text x="72" y="662" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#9ca3af">Sources: SEBI Zomato Prospectus, BSE Basis of Allotment, Zomato Annual Report 2021-22, and contemporaneous listing report.</text>
</svg>
