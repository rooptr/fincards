<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Microsoft Activision M&amp;A evidence extract</title>
  <desc id="desc">A field extract rebuilt from SEC filings showing announced cash consideration, transaction value, closing date, accounting purchase price, goodwill and acquired intangibles.</desc>
  <rect width="1200" height="720" fill="#fbfbfd"/>
  <text x="72" y="74" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111827">Microsoft and Activision Blizzard</text>
  <text x="72" y="112" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#6b7280">Transaction and purchase accounting fields reconstructed from SEC filings</text>
  <rect x="72" y="150" width="1056" height="470" rx="18" fill="#ffffff" stroke="#d9dde5"/>
  <rect x="72" y="150" width="1056" height="60" rx="18" fill="#f0f5ff"/><rect x="72" y="192" width="1056" height="18" fill="#f0f5ff"/>
  <text x="98" y="188" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">SEC filing field</text><text x="560" y="188" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Recorded value</text>
  <line x1="72" y1="210" x2="1128" y2="210" stroke="#e5e7eb"/>
  <text x="98" y="252" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Announced consideration</text><text x="560" y="252" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$95.00 per share, all cash</text>
  <line x1="98" y1="273" x2="1102" y2="273" stroke="#eef0f4"/>
  <text x="98" y="310" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Announced transaction value</text><text x="560" y="310" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$68.7 billion, inclusive of net cash</text>
  <line x1="98" y1="331" x2="1102" y2="331" stroke="#eef0f4"/>
  <text x="98" y="368" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Closing date</text><text x="560" y="368" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">October 13, 2023</text>
  <line x1="98" y1="389" x2="1102" y2="389" stroke="#eef0f4"/>
  <text x="98" y="426" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Accounting purchase price</text><text x="560" y="426" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$75.4 billion</text>
  <line x1="98" y1="447" x2="1102" y2="447" stroke="#eef0f4"/>
  <text x="98" y="484" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Goodwill, preliminary allocation</text><text x="560" y="484" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$50.945 billion</text>
  <line x1="98" y1="505" x2="1102" y2="505" stroke="#eef0f4"/>
  <text x="98" y="542" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Acquired intangible assets</text><text x="560" y="542" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$22.046 billion</text>
  <text x="72" y="674" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#9ca3af">Sources: Microsoft and Activision Blizzard SEC filings, including Microsoft Form 10-K 2024 Note 8.</text>
</svg>
