<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Reliance Retail financial performance field extract</title>
  <desc id="desc">Revenue and EBITDA for Reliance Retail in FY 2024-25 and FY 2023-24.</desc>
  <rect width="1200" height="520" fill="#ffffff"/>
  <text x="64" y="72" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Reliance Retail, financial performance</text>
  <text x="64" y="108" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Reliance Industries Integrated Annual Report 2024-25, figures in Rs crore.</text>
  <line x1="64" y1="140" x2="1136" y2="140" stroke="#d1d5db"/>
  <g font-family="Arial, sans-serif" font-size="19" fill="#111827">
    <text x="80" y="190" font-weight="700">Metric</text><text x="560" y="190" font-weight="700">FY 2024-25</text><text x="820" y="190" font-weight="700">FY 2023-24</text>
    <text x="80" y="250">Revenue from operations</text><text x="560" y="250">291,043</text><text x="820" y="250">273,131</text>
    <text x="80" y="310">EBITDA</text><text x="560" y="310">25,094</text><text x="820" y="310">23,108</text>
    <text x="80" y="370">Reported EBITDA growth</text><text x="560" y="370">8.6%</text><text x="820" y="370">year on year</text>
    <text x="80" y="430">Reported revenue growth</text><text x="560" y="430">6.6%</text><text x="820" y="430">year on year</text>
  </g>
  <text x="64" y="480" font-family="Arial, sans-serif" font-size="15" fill="#6b7280">Source field: Retail business performance, FY 2024-25 and FY 2023-24.</text>
</svg>
