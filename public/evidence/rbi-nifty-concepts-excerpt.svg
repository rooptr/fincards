  <text x="700" y="224" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2563eb">US$5.7 billion surplus</text>
  <text x="78" y="262" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">FY2023-24 current account balance</text>
  <text x="700" y="262" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#202124">US$23.2 billion deficit</text>
  <text x="78" y="300" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">FY2023-24 portfolio investment</text>
  <text x="700" y="300" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2563eb">US$44.1 billion inflow</text>
  <line x1="78" y1="334" x2="1122" y2="334" stroke="#d8dbe2"/>
  <text x="78" y="374" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#202124">Nifty 50 portfolio artifact</text>
  <text x="78" y="414" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">Constituents</text>
  <text x="700" y="414" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#202124">50</text>
  <text x="78" y="452" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">Average free-float market-cap representation</text>
  <text x="700" y="452" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2563eb">57.35%</text>
  <text x="78" y="490" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">Financial Services sector weight</text>
  <text x="700" y="490" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#202124">33.53%</text>
