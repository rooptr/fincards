  <text x="700" y="528" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2563eb">13.04%</text>
  <text x="78" y="588" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5f6368">The two artifacts teach different mechanisms: external-account reconciliation and portfolio diversification.</text>
