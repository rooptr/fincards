<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Walmart working capital evidence extract</title>
  <desc id="desc">A field extract rebuilt from Walmart’s 2024 annual report showing working capital inputs and the derived cash conversion cycle.</desc>
  <rect width="1200" height="760" fill="#fbfbfd"/>
  <text x="72" y="70" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#111827">Walmart FY2024 working-capital fields</text>
  <text x="72" y="106" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#6b7280">Amounts in millions. Derived days use two-year average balances and annual flows.</text>
  <rect x="72" y="140" width="1056" height="500" rx="18" fill="#ffffff" stroke="#d9dde5"/>
  <rect x="72" y="140" width="1056" height="58" rx="18" fill="#f0f5ff"/>
  <rect x="72" y="180" width="1056" height="18" fill="#f0f5ff"/>
  <text x="98" y="176" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Field</text>
  <text x="470" y="176" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Value</text>
  <text x="840" y="176" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Use</text>
  <line x1="72" y1="198" x2="1128" y2="198" stroke="#e5e7eb"/>
  <text x="98" y="238" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Current assets</text><text x="470" y="238" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$76,877m</text><text x="840" y="238" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">Working capital</text>
  <line x1="98" y1="256" x2="1102" y2="256" stroke="#eef0f4"/>
  <text x="98" y="294" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Current liabilities</text><text x="470" y="294" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$92,415m</text><text x="840" y="294" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">Working capital</text>
  <line x1="98" y1="312" x2="1102" y2="312" stroke="#eef0f4"/>
  <text x="98" y="350" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Inventory / Receivables / Payables</text><text x="470" y="350" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">$54,892m / $8,796m / $56,812m</text><text x="840" y="350" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">Operating cycle</text>
  <line x1="98" y1="368" x2="1102" y2="368" stroke="#eef0f4"/>
  <text x="98" y="406" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">Days Inventory / Sales / Payables</text><text x="470" y="406" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">42.7 / 4.9 / 42.3 days</text><text x="840" y="406" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">CCC inputs</text>
  <line x1="98" y1="424" x2="1102" y2="424" stroke="#eef0f4"/>
  <text x="98" y="462" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#111827">Working capital</text><text x="470" y="462" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">−$15,538m</text><text x="840" y="462" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">Current assets − liabilities</text>
  <line x1="98" y1="480" x2="1102" y2="480" stroke="#eef0f4"/>
  <text x="98" y="518" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#111827">Cash Conversion Cycle</text><text x="470" y="518" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2563eb">5.2 days</text><text x="840" y="518" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#374151">DIO + DSO − DPO</text>
  <text x="72" y="700" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#9ca3af">Source: Walmart Inc. Annual Report 2024, pages 54, 56, and 58. Derived values use same-filing fields.</text>
</svg>
