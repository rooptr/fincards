<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520"><rect width="1000" height="520" fill="#fff"/><rect x="36" y="32" width="928" height="456" rx="22" fill="#fbfbfd" stroke="#d9dce3"/><text x="72" y="88" font-family="Arial" font-size="25" font-weight="700" fill="#16181d">IFRS 15 • revenue recognition sequence</text><text x="72" y="122" font-family="Arial" font-size="15" fill="#68707d">IFRS Foundation standard summary</text><g font-family="Arial" font-size="18" fill="#252932"><text x="72" y="190">1. Identify the contract</text><text x="72" y="240">2. Identify performance obligations</text><text x="72" y="290">3. Determine transaction price</text><text x="72" y="340">4. Allocate transaction price</text><text x="72" y="390">5. Recognize revenue on transfer of control</text></g><text x="72" y="452" font-family="Arial" font-size="13" fill="#2563eb">Source: https://www.ifrs.org/issued-standards/list-of-standards/ifrs-15-revenue-from-contracts/</text></svg>
