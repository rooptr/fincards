<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690">
  <rect width="1200" height="690" fill="#fff"/>
  <rect x="42" y="38" width="1116" height="614" rx="18" fill="#fafafa" stroke="#d8dbe2"/>
  <text x="78" y="86" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#202124">PRIMARY SOURCE EXCERPT</text>
  <text x="78" y="120" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5f6368">Vedanta Limited demerger announcement • 29 September 2023 • official company release</text>
  <line x1="78" y1="144" x2="1122" y2="144" stroke="#d8dbe2"/>
  <text x="78" y="186" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#202124">Separation mechanics</text>
  <text x="78" y="226" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">Independent listed companies planned</text>
  <text x="700" y="226" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2563eb">6</text>
  <text x="78" y="266" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">Share entitlement</text>
  <text x="700" y="266" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#202124">1 for 1 across 5 new entities</text>
  <text x="78" y="306" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">Profit concentration in India</text>
  <text x="700" y="306" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2563eb">More than 90%</text>
  <line x1="78" y1="340" x2="1122" y2="340" stroke="#d8dbe2"/>
  <text x="78" y="384" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#202124">Stated economic rationale</text>
  <text x="78" y="426" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#202124">Each vertical receives independent management, capital allocation, and focused growth strategy.</text>
  <text x="78" y="470" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#202124">The proposal aims to create pure-play businesses and broaden the investor base.</text>
  <line x1="78" y1="508" x2="1122" y2="508" stroke="#d8dbe2"/>
  <text x="78" y="552" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#202124">The lesson must still test execution risk, stranded costs, leverage allocation, and valuation evidence.</text>
  <text x="78" y="598" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5f6368">Source: Vedanta Limited official press release, pages 1 to 2</text>
</svg>
