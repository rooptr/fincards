  <text x="570" y="264" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#202124">15.63% annualised return</text>
  <text x="78" y="302" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">5 years</text>
  <text x="570" y="302" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#202124">15.28% annualised return</text>
  <text x="78" y="340" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#202124">1 year</text>
  <text x="570" y="340" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2563eb">30.08% annualised return</text>
