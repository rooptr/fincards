<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">SEBI margin trading field extract</title>
  <desc id="desc">Field extract of the SEBI margin trading discussion paper showing the published margin example.</desc>
  <rect width="1200" height="560" fill="#ffffff"/>
  <text x="64" y="72" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">SEBI Discussion Paper on Margin Trading and Securities Lending</text>
  <text x="64" y="108" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Published example reproduced as a field extract. Source: SEBI margin trading discussion paper.</text>
  <line x1="64" y1="140" x2="1136" y2="140" stroke="#d1d5db"/>
  <g font-family="Arial, sans-serif" font-size="19" fill="#111827">
    <text x="80" y="190" font-weight="700">Purchase value</text><text x="610" y="190">Rs 100</text>
    <text x="80" y="240" font-weight="700">Initial margin</text><text x="610" y="240">50%  |  Rs 50</text>
    <text x="80" y="290" font-weight="700">Maintenance margin</text><text x="610" y="290">25%  |  Rs 15 after the decline</text>
    <text x="80" y="340" font-weight="700">Collateral value after decline</text><text x="610" y="340">Rs 60  |  40% depreciation</text>
    <text x="80" y="390" font-weight="700">Current equity</text><text x="610" y="390">Rs 10  |  Rs 60 less Rs 50 debt</text>
    <text x="80" y="440" font-weight="700">Margin call</text><text x="610" y="440">Rs 5  |  Rs 15 required less Rs 10 equity</text>
  </g>
  <text x="64" y="510" font-family="Arial, sans-serif" font-size="15" fill="#6b7280">Source field: SEBI Discussion Paper, section 1.4, mechanism of margin trading.</text>
</svg>
